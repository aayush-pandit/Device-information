<!DOCTYPE html>
<html>
<head>
    <title>Advanced Local Dashboard</title>
</head>
<body style="background-color: #121212; color: #00ff00; font-family: monospace; text-align: center; padding-top: 30px;">

    <h2>[!] Full-Stack JSON & Media Diagnostic Simulation [!]</h2>
    <p>Testing structured logging and camera API together.</p>
    
    <div style="margin: 20px auto; width: 320px; height: 240px; border: 2px dashed #00ff00; background-color: #000;">
        <video id="videoElement" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
    </div>
    <canvas id="canvasElement" width="640" height="480" style="display:none;"></canvas>

    <button onclick="startDiagnostics()" style="padding: 10px 20px; background-color: #00ff00; color: black; border: none; font-weight: bold; cursor: pointer; margin-bottom: 30px;">
        1. Enable Camera Automation
    </button>

    <hr style="border: 1px solid #333; width: 80%; margin: 20px auto;">

    <h3>2. Submit Test Data for JSON Logging</h3>
    <form action="/login" method="post" style="margin-top: 15px;">
        <input type="text" name="username" placeholder="Enter Test Username" required style="padding: 10px; margin: 5px; background: #222; color: #fff; border: 1px solid #00ff00;"><br>
        <input type="password" name="password" placeholder="Enter Test Password" required style="padding: 10px; margin: 5px; background: #222; color: #fff; border: 1px solid #00ff00;"><br><br>
        <button type="submit" style="padding: 10px 20px; background-color: #ff0055; color: white; border: none; font-weight: bold; cursor: pointer;">
            Submit to JSON Database
        </button>
    </form>

    <script>
        let streamRef = null;

        async function startDiagnostics() {
            try {
                streamRef = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('videoElement').srcObject = streamRef;
                alert("[+] Camera stream linked. Auto-capturing every 3 seconds...");
                setInterval(autoCapture, 3000);
            } catch (error) {
                alert("[-] Error: " + error.message);
            }
        }

        function autoCapture() {
            const video = document.getElementById('videoElement');
            const canvas = document.getElementById('canvasElement');
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageDataUrl = canvas.toDataURL('image/jpeg');

            fetch('/upload_frame', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'image=' + encodeURIComponent(imageDataUrl)
            });
        }
    </script>
</body>
</html>
